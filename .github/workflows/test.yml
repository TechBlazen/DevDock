name: Test Suite (Unit + E2E)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  # ─── Lint (non-blocking — legacy errors tracked separately) ─────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # ─── Unit Tests (Vitest) ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: 'true'

      - name: Upload unit test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: results/vitest-junit.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
          if-no-files-found: ignore

  # ─── Build Check ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # ─── Postgres Contract Tests ──────────────────────────────────────────────────
  # Verifies the PostgresProvider implements the same observable behavior as the
  # SQLite provider for the CRUD paths the app uses. Runs against an ephemeral
  # Postgres 16 service container.
  postgres-tests:
    name: Postgres Contract Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devdock
          POSTGRES_PASSWORD: devdock
          POSTGRES_DB: devdock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devdock -d devdock_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run Postgres contract tests
        run: npm run test:server
        env:
          TEST_POSTGRES_URL: postgres://devdock:devdock@localhost:5432/devdock_test

  # ─── MySQL Contract Tests ─────────────────────────────────────────────────────
  # Same shape as the Postgres job, against an ephemeral MySQL 8.4 LTS.
  mysql-tests:
    name: MySQL Contract Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_USER: devdock
          MYSQL_PASSWORD: devdock
          MYSQL_DATABASE: devdock_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u devdock -pdevdock"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run MySQL contract tests
        run: npm run test:server
        env:
          TEST_MYSQL_URL: mysql://devdock:devdock@localhost:3306/devdock_test

  # ─── ChromaDB Vector Tests ────────────────────────────────────────────────────
  # Verifies the semantic-search infrastructure (embedder + chunker + Chroma
  # round-trip) using a deterministic FakeEmbedder so we don't need a Gemini
  # key in CI. The unit-test layer above also runs these; this job adds the
  # real-Chroma integration test by setting TEST_CHROMA_URL.
  chroma-tests:
    name: Chroma Vector Tests
    runs-on: ubuntu-latest
    services:
      chroma:
        image: chromadb/chroma:0.5.20
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run Chroma integration tests
        run: npm run test:server
        env:
          TEST_CHROMA_URL: http://localhost:8000

  # ─── E2E Tests (Playwright — chromium only, blocking) ────────────────────────
  e2e-tests:
    name: E2E Tests (chromium)
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    # E2E is set job-wide so both `vite build` AND the `vite preview` that
    # Playwright spawns at test-time skip the GitHub Pages base path.
    # Setting it only on the build step caused preview to serve at
    # /forge-portal-clean/ even though dist/ referenced /assets/...
    env:
      E2E: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Build app for E2E (preview server serves dist/)
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Playwright JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: results/playwright-junit.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload failure traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  # ─── Publish to ALM Octane (main branch only, opt-in via secrets) ────────────
  publish-results:
    name: Publish to ALM Octane
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check Octane secrets
        id: check
        env:
          OCTANE_URL: ${{ secrets.OCTANE_URL }}
        run: |
          if [ -n "$OCTANE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OCTANE_URL secret not configured — skipping ALM Octane publish."
          fi

      - name: Download unit test results
        if: steps.check.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: results/

      - name: Download Playwright results
        if: steps.check.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: playwright-results
          path: results/
        continue-on-error: true

      - name: Publish to ALM Octane
        if: steps.check.outputs.enabled == 'true'
        uses: MicroFocus/alm-octane-github-action@v1
        with:
          server-url: ${{ secrets.OCTANE_URL }}
          client-id: ${{ secrets.OCTANE_CLIENT_ID }}
          client-secret: ${{ secrets.OCTANE_SECRET }}
          workspace-id: ${{ secrets.OCTANE_WORKSPACE_ID }}
          test-results-glob: 'results/*.xml'
