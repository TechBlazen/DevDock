# Prometheus config for the local observability stack.
# Scrapes the OTel collector (for app-emitted metrics exported in the
# Prometheus format) and its own /metrics endpoint.
#
# remote-write receiver is enabled so Tempo's metrics_generator can push
# service-graph and span metrics directly.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
