# Grafana Tempo — minimal single-binary config for local dev.
# Accepts OTLP from the collector, stores traces on the local filesystem.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

# The in-process distributor also fronts OTLP ingestion.
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s

compactor:
  compaction:
    block_retention: 24h   # drop anything older than a day — dev-only

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Enable TraceQL metric queries (so the Grafana dashboard can show rate/latency
# panels without a separate Prometheus query path).
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
