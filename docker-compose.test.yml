# Ephemeral Postgres for running the DatabaseProvider contract tests locally.
# Used by: TEST_POSTGRES_URL=postgres://devdock:devdock@localhost:5433/devdock_test npm run test:server
#
#   docker compose -f docker-compose.test.yml up -d
#   …run tests…
#   docker compose -f docker-compose.test.yml down -v
#
# Port 5433 (not the default 5432) avoids colliding with any local Postgres
# the developer is already running.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devdock
      POSTGRES_PASSWORD: devdock
      POSTGRES_DB: devdock_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devdock -d devdock_test']
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  chroma-test:
    # ChromaDB vector store. Used by the Phase 1 semantic search feature.
    # In-memory tmpfs so the next `up` starts clean.
    image: chromadb/chroma:0.5.20
    ports:
      - '8001:8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/api/v2/heartbeat || exit 1']
      interval: 3s
      timeout: 5s
      retries: 20
    tmpfs:
      - /chroma/chroma
