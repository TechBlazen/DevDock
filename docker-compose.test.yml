# Ephemeral Postgres for running the DatabaseProvider contract tests locally.
# Used by: TEST_POSTGRES_URL=postgres://devdock:devdock@localhost:5433/devdock_test npm run test:server
#
#   docker compose -f docker-compose.test.yml up -d
#   …run tests…
#   docker compose -f docker-compose.test.yml down -v
#
# Port 5433 (not the default 5432) avoids colliding with any local Postgres
# the developer is already running.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devdock
      POSTGRES_PASSWORD: devdock
      POSTGRES_DB: devdock_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devdock -d devdock_test']
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  mysql-test:
    # 8.4 is the current LTS; 8.0.20+ required for the alias-form
    # ON DUPLICATE KEY UPDATE syntax used by the upserts.
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_USER: devdock
      MYSQL_PASSWORD: devdock
      MYSQL_DATABASE: devdock_test
    command:
      - '--character-set-server=utf8mb4'
      - '--collation-server=utf8mb4_unicode_ci'
    ports:
      - '3307:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'devdock', '-pdevdock']
      interval: 3s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/mysql
