version: '3.8'

services:
  forge-portal:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    
    container_name: forge-portal
    
    ports:
      - "8080:80"
    
    restart: unless-stopped
    
    environment:
      - NODE_ENV=production
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    
    labels:
      - "com.forge-portal.description=Forge Portal - AI-Powered Developer Portal"
      - "com.forge-portal.version=1.0.0"
